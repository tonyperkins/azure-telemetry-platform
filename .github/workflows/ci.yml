name: CI

on:
  workflow_dispatch:


env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build + test .NET projects
  # ---------------------------------------------------------------------------
  dotnet-build-test:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    # SRE: Provide a real SQL Server instance for integration tests, replacing the
    # reliance on Windows-only LocalDB. This perfectly matches production behavior.
    services:
      sql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore azure-telemetry-platform.sln
        # working-directory: azure-telemetry-platform (removed prefix)

      - name: Build (Release)
        run: dotnet build azure-telemetry-platform.sln --no-restore --configuration Release

      - name: Initialize Test Database
        uses: azure/sql-action@v2
        with:
          connection-string: "Server=localhost,1433;Database=master;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"
          path: './scripts/seed-local-db.sql'

      - name: dotnet test
        # SRE: Tests run against the local SQL Server service container in CI.
        # Integration tests verify real query correctness — mocks alone are not sufficient.
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TelemetryDev;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"
        run: dotnet test azure-telemetry-platform.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
        continue-on-error: true

      - name: Report Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Publish TelemetryApi artifact
        run: >
          dotnet publish src/TelemetryApi/TelemetryApi.csproj
          --no-build
          --configuration Release
          --output ./artifacts/TelemetryApi
        # working-directory: azure-telemetry-platform (removed prefix)

      - name: Publish Functions artifact
        run: >
          dotnet publish src/TelemetryFunctions/TelemetryFunctions.csproj
          --no-build
          --configuration Release
          --output ./artifacts/Functions
        # working-directory: azure-telemetry-platform (removed prefix)

      - name: Upload TelemetryApi artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-api
          path: artifacts/TelemetryApi
          retention-days: 7

      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions
          path: artifacts/Functions
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Build React dashboard
  # ---------------------------------------------------------------------------
  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: TypeScript type-check + build
        run: npm run build
        working-directory: dashboard
        env:
          VITE_API_BASE_URL: https://placeholder-replaced-at-deploy-time.azurewebsites.net

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Terraform validate (no Azure credentials needed)
  # ---------------------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'

      - name: terraform init (backend disabled for validation)
        run: terraform init -backend=false
        working-directory: infra

      - name: terraform validate
        run: terraform validate
        working-directory: infra

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra
